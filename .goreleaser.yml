version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: ssh-matrix
    binaries:
      - ssh-matrix
    homepage: https://github.com/umit144/ssh-matrix
    description: A terminal UI for browsing and connecting to SSH hosts
    repository:
      owner: umit144
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

changelog:
  use: github-native
